<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Auditoría de Fuga Patrimonial - MB Capital</title>

<style>
:root {
    --bg:#0d1117;
    --surface:#161b22;
    --primary:#58a6ff;
    --danger:#f85149;
    --warning:#f1e05a;
    --success:#238636;
    --text:#c9d1d9;
    --text-dim:#8b949e;
}

*{box-sizing:border-box;margin:0;padding:0}

body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto;
    background:var(--bg);
    color:var(--text);
    padding:15px;
}

.container{max-width:420px;margin:auto}

.hero{text-align:center;margin-bottom:20px}
.hero h1{font-size:22px;color:#fff;margin-bottom:8px}
.hero p{font-size:12px;color:var(--text-dim)}

.card{
    background:var(--surface);
    border:1px solid #30363d;
    border-radius:12px;
    padding:20px;
}

.field{margin-bottom:12px}
label{font-size:10px;color:var(--text-dim);display:block;margin-bottom:4px}

input{
    width:100%;
    padding:12px;
    background:#0d1117;
    border:1px solid #30363d;
    border-radius:8px;
    color:#fff;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    font-weight:700;
    cursor:pointer;
}

.btn-main{background:var(--primary);color:#fff;margin-top:10px}

.dashboard{display:none;margin-top:20px}

.total{
    font-size:26px;
    font-weight:800;
    text-align:center;
    margin-bottom:15px;
}

.box{
    background:#1c2128;
    padding:15px;
    border-radius:8px;
    margin-bottom:12px;
}

.warn{color:var(--danger);font-weight:700}

.whatsapp{
    background:var(--success);
    color:#fff;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="hero">
<h1>Tu cliente está usando tu capital</h1>
<p>Calculá el costo financiero real de no cobrar a tiempo</p>
</div>

<div class="card">

<div class="field">
<label>Monto adeudado</label>
<input type="number" id="monto">
</div>

<div class="field">
<label>Fecha de vencimiento</label>
<input type="date" id="fecha">
</div>

<div class="field">
<label>TNA (%) - referencia bancaria</label>
<input type="number" id="tna" value="120">
</div>

<div class="field">
<label>Margen neto (%)</label>
<input type="number" id="margen" value="20">
</div>

<button class="btn-main" onclick="calcular()">Calcular impacto</button>

<div id="dashboard" class="dashboard">

<div class="total" id="total"></div>

<div class="box" id="score-box"></div>

<div class="box" id="segmento-box"></div>

<div class="box" id="proyeccion"></div>

<div class="box" id="ventas"></div>

<div class="box warn" id="alerta"></div>

<div style="font-size:11px;color:#8b949e;margin-top:10px;">
Cálculo basado en tasa activa bancaria sobre saldos vencidos.
</div>

<button class="whatsapp" onclick="wa()">Analizar este caso</button>

</div>

</div>

</div>

<script>

let timer;

const fmt = new Intl.NumberFormat('es-AR',{
    style:'currency',
    currency:'ARS'
});

function calcular(){

    clearInterval(timer);

    const monto = parseFloat(document.getElementById("monto").value);
    const fecha = new Date(document.getElementById("fecha").value);
    const tna = parseFloat(document.getElementById("tna").value)/100;
    const margen = parseFloat(document.getElementById("margen").value)/100;

    if(!monto || monto<=0 || isNaN(fecha.getTime()) || tna<=0 || margen<=0){
        alert("Completá los datos correctamente");
        return;
    }

    document.getElementById("dashboard").style.display="block";

    timer = setInterval(()=>{

        const ahora = new Date();
        const dias = (ahora - fecha)/86400000;

        if(dias <= 0) return;

        const interes = monto * (tna/365) * dias;

        document.getElementById("total").innerText = fmt.format(interes);

        // SCORE
        const ratio = interes / monto;

        let score = "";
        let color = "";

        if (ratio < 0.02){
            score = "BAJA";
            color = "#238636";
        } else if (ratio < 0.05){
            score = "MEDIA";
            color = "#f1e05a";
        } else {
            score = "ALTA";
            color = "#f85149";
        }

        document.getElementById("score-box").innerHTML =
        `<b>Nivel de urgencia:</b> 
        <span style="color:${color}; font-weight:700;">${score}</span><br>
        <span style="font-size:12px; color:#8b949e;">
        La pérdida ya representa el ${(ratio*100).toFixed(2)}% del capital.
        </span>`;

        // SEGMENTACIÓN
        let mensaje = "";

        if (ratio < 0.02){
            mensaje = "Todavía estás a tiempo de corregir esto sin impacto relevante.";
        } else if (ratio < 0.05){
            mensaje = "Esto ya empieza a afectar tu rentabilidad.";
        } else if (ratio < 0.1){
            mensaje = "Esto está deteriorando tu resultado financiero.";
        } else {
            mensaje = "Esto ya es una pérdida significativa de patrimonio.";
        }

        document.getElementById("segmento-box").innerText = mensaje;

        // PROYECCIÓN
        const interes30 = interes + (monto * (tna/365) * 30);
        const interes60 = interes + (monto * (tna/365) * 60);
        const interes90 = interes + (monto * (tna/365) * 90);

        document.getElementById("proyeccion").innerHTML =
        `<b>Proyección:</b><br>
        30 días: ${fmt.format(interes30)}<br>
        60 días: ${fmt.format(interes60)}<br>
        90 días: ${fmt.format(interes90)}`;

        // IMPACTO COMERCIAL
        const ventas = interes / margen;

        document.getElementById("ventas").innerText =
        `Necesitás facturar ${fmt.format(ventas)} para recuperar esta pérdida.`;

        // ALERTA
        if(interes >= monto * 0.05){
            document.getElementById("alerta").innerText =
            "La pérdida ya supera el 5% del capital. Esto dejó de ser un atraso operativo.";
        } else {
            document.getElementById("alerta").innerText = "";
        }

    },1000);
}

function wa(){

    const total = document.getElementById("total").innerText;

    const msg = encodeURIComponent(
`Hola, analicé una deuda con la herramienta de MB Capital.

La pérdida estimada es ${total}.

Quiero evaluar cómo resolver esto.`
    );

    window.location.href = `https://wa.me/5491166463800?text=${msg}`;
}

</script>

</body>
</html>
